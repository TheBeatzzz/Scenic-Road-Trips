<body>
  <div id="root"></div>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // SVG Icon Components
    const MapPin = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">

        <circle cx="12" cy="10" r="3"></circle>
      </svg>
    );
    
    const Clock = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="10"></circle>
        <polyline points="12 6 12 12 16 14"></polyline>
      </svg>
    );
    
    const Sun = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <circle cx="12" cy="12" r="4"></circle>
        <path d="M12 2v2"></path>
        <path d="M12 20v2"></path>
        <path d="m4.93 4.93 1.41 1.41"></path>
        <path d="m17.66 17.66 1.41 1.41"></path>
        <path d="M2 12h2"></path>
        <path d="M20 12h2"></path>
        <path d="m6.34 17.66-1.41 1.41"></path>
        <path d="m19.07 4.93-1.41 1.41"></path>
      </svg>
    );
    
    const Moon = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
      </svg>
    );
    
    const Thermometer = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M14 4v10.54a4 4 0 1 1-4 0V4a2 2 0 0 1 4 0Z"></path>
      </svg>
    );
    
    const Droplets = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"></path>
        <path d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"></path>
      </svg>
    );
    
    const Fuel = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="3" y1="22" x2="15" y2="22"></line>
        <line x1="4" y1="9" x2="14" y2="9"></line>
        <path d="M14 22V4a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v18"></path>
        <path d="M14 13h2a2 2 0 0 1 2 2v2a2 2 0 0 0 2 2h0a2 2 0 0 0 2-2V9.83a2 2 0 0 0-.59-1.42L18 5"></path>
      </svg>
    );
    
    const DollarSign = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <line x1="12" y1="2" x2="12" y2="22"></line>
        <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
      </svg>
    );
    
    const Camera = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
        <circle cx="12" cy="13" r="3"></circle>
      </svg>
    );
    
    const Calendar = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
        <line x1="16" y1="2" x2="16" y2="6"></line>
        <line x1="8" y1="2" x2="8" y2="6"></line>
        <line x1="3" y1="10" x2="21" y2="10"></line>
      </svg>
    );
    
    const ChevronRight = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polyline points="9 18 15 12 9 6"></polyline>
      </svg>
    );
    
    const Navigation = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="3 11 22 2 13 21 11 13 3 11"></polygon>
      </svg>
    );
    
    const MapIcon = ({ className = '', ...props }) => (
      <svg {...props} className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"></polygon>
        <line x1="8" y1="2" x2="8" y2="18"></line>
        <line x1="16" y1="6" x2="16" y2="22"></line>
      </svg>
    );

    const App = () => {
      const [images, setImages] = useState({});
      const [loadingImages, setLoadingImages] = useState({});

      const itinerary = [
        {
          day: 1,
          title: "Arrive → Zion",
          location: "Zion National Park",
          mapQuery: "Zion National Park, UT",
          drive: "4.5 hrs via I-15 S",
          schedule: [
            { time: "12:00", text: "Land + pick up SUV" },
            { time: "13:00", text: "Depart SLC" },
            { time: "15:45", text: "Fuel stop (Cedar City)" },
            { time: "17:30", text: "Arrive Springdale" }
          ],
          highlights: "Zion–Mt. Carmel Highway, Canyon Overlook Trail",
          stay: "Zion Canyon Lodge",
          image: "https://www.nationalparked.com/files/jpg/zion/ftr-zion-mt-carmel-highway-0191.jpg",
          prompt: "Cinematic wide shot of Zion National Park's red rock canyon walls and the Virgin River at sunset, dramatic lighting"
        },
    {
      day: 2,
      title: "Zion (Scenic + Easy)",
      location: "Zion Canyon",
      mapQuery: "Springdale, UT",
      drive: "Local Shuttle",
      schedule: [
        { time: "06:15", text: "Sunrise at Canyon Junction" },
        { time: "07:00", text: "Scenic Shuttle ride" },
        { time: "11:00", text: "REST (Avoid July heat)" },
        { time: "18:00", text: "Sunset: Pa’rus Trail" }
      ],
      highlights: "Sunrise peaks, riverside walks, sunset strolls",
      stay: "Zion Canyon Lodge",
      image: "https://www.nps.gov/zion/planyourvisit/images/SnowTemples_11092022_04.jpg",
      prompt: "A peaceful morning view of the Watchman peak in Zion National Park reflecting in the Virgin River"
    },
        {
          day: 3,
          title: "Zion → Bryce",
          location: "Bryce Canyon National Park",
          mapQuery: "Bryce Canyon National Park, UT",
          drive: "2 hrs",
          schedule: [
            { time: "10:00", text: "Rim Drive viewpoints" },
            { time: "14:00", text: "Check-in & Rest" },
            { time: "19:00", text: "Sunset: Bryce Point ⭐" }
          ],
          highlights: "Hoodoos, amphitheater views, high altitude cooling",
          stay: "Best Western Plus Bryce Canyon Grand Hotel",
          image: "https://www.visitutah.com/azure/cmsroot/visitutah/media/site-assets/three-season-photography/mighty-5/bryce-canyon/web2000_brycecanyon_hoodoos_larrycprice.jpg?w=450&h=450&mode=crop&scale=both",
          prompt: "The Bryce Canyon Amphitheater filled with thousands of orange sandstone hoodoos and pine trees"
        },
        {
          day: 4,
          title: "Byway 12 → Capitol Reef",
          location: "Scenic Byway 12",
          mapQuery: "Grand Staircase-Escalante National Monument",
          drive: "3.5–5 hrs with stops",
          schedule: [
            { time: "09:00", text: "Depart Bryce" },
            { time: "12:00", text: "Hogback Ridge Drive" },
            { time: "18:30", text: "Sunset: Panorama Point" }
          ],
          highlights: "Escalante, Hogback Ridge, Boulder Mountain",
          stay: "Capitol Reef Resort",
          image: "https://capitolreefcountry.com/wp-content/uploads/elementor/thumbs/ArchCapitolReef-scaled-qpurecvi48kff3uyz3g6u2qbhahunyh4goo968773s.jpg",
          prompt: "A winding scenic road through the rugged white and red rock desert canyons of Grand Staircase-Escalante"
        },
        {
          day: 5,
          title: "Capitol Reef → Moab",
          location: "Moab & Capitol Reef",
          mapQuery: "Capitol Reef National Park, UT",
          drive: "2.5–3 hrs",
          schedule: [
            { time: "08:00", text: "Capitol Reef Scenic Drive" },
            { time: "11:00", text: "Optional: Goblin Valley" },
            { time: "15:00", text: "Arrive Moab → REST" }
          ],
          highlights: "Waterpocket Fold, Cathedral Valley views, Moab transition",
          stay: "Hyatt Place Moab",
          image: "https://images.ctfassets.net/0wjmk6wgfops/1DVLT3AB71ITNuwRww6egZ/8dcc7a1255a5ddb7c0f89abba434ee0f/Waterpocket_Fold.jpg",
          prompt: "The dramatic red rock cliffs and fruit orchards of Fruita in Capitol Reef National Park"
        },
        {
          day: 6,
          title: "Arches",
          location: "Arches National Park",
          mapQuery: "Arches National Park, UT",
          drive: "Local",
          schedule: [
            { time: "05:45", text: "Enter early (Timed Entry)" },
            { time: "08:00", text: "Windows Section & Landscape Arch" },
            { time: "12:00", text: "REST at Hotel" },
            { time: "18:30", text: "Sunset: Delicate Arch" }
          ],
          highlights: "Delicate Arch, Double Arch, Park Avenue",
          stay: "Hyatt Place Moab",
          image: "https://res.cloudinary.com/simpleview/image/upload/v1742321957/clients/grandcountyut/Winter_Sunset_at_Delicate_Arch_1_2_014c6d67-6823-4fcf-935e-c54ed5a9b61d.jpg",
          prompt: "Delicate Arch in Arches National Park glowing orange during a dramatic sunset with a vast desert backdrop"
        },
        {
          day: 7,
          title: "Monument Valley",
          location: "The View Hotel",
          mapQuery: "Monument Valley Navajo Tribal Park",
          drive: "2.5–3 hrs",
          schedule: [
            { time: "10:00", text: "Depart Moab" },
            { time: "13:00", text: "Forrest Gump Point" },
            { time: "16:00", text: "Scenic loop drive" },
            { time: "19:30", text: "Sunset from balcony" }
          ],
          highlights: "Forrest Gump Point, Tribal Park Loop, Starry Skies",
          stay: "The View Hotel (Crucial Booking)",
          image: "https://www.travelinusa.us/wp-content/uploads/sites/3/2019/11/forrest-gump-point.webp",
          prompt: "The iconic sandstone buttes of Monument Valley under a clear starry desert sky"
        },
        {
          day: 8,
          title: "Sunrise → Canyonlands",
          location: "Canyonlands & SLC",
          mapQuery: "Canyonlands National Park, UT",
          drive: "7 hrs total",
          schedule: [
            { time: "06:00", text: "Sunrise from balcony" },
            { time: "10:00", text: "Canyonlands: Mesa Arch" },
            { time: "14:00", text: "Dead Horse Point" },
            { time: "18:30", text: "Return to SLC Airport" }
          ],
          highlights: "Mesa Arch, Grand View Point, Dead Horse Point",
          stay: "Return Flight",
          image: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRzOomhNARWqYto-n0dND--TYbfRuLpJ9j12Q&s",
          prompt: "Mesa Arch in Canyonlands National Park framing a vast canyon vista at sunrise"
        }
      ];

      const generateImage = async (prompt, day) => {
        const apiKey = "";
        setLoadingImages(prev => ({ ...prev, [day]: true }));
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              instances: [{ prompt: prompt }],
              parameters: { sampleCount: 1 }
            })
          });
          const data = await response.json();
          if (data.predictions && data.predictions[0]) {
            setImages(prev => ({ ...prev, [day]: `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}` }));
          }
        } catch (error) {
          console.error("Failed to generate image:", error);
        } finally {
          setLoadingImages(prev => ({ ...prev, [day]: false }));
        }
      };

      useEffect(() => {
        itinerary.slice(0, 3).forEach(item => {
          generateImage(item.prompt, item.day);
        });
      }, []);

      return (
        <div className="min-h-screen bg-stone-50 text-stone-900 font-sans pb-12">
      {/* Hero Section */}
      <header className="relative h-[60vh] flex items-center justify-center overflow-hidden bg-stone-900">
        <div className="absolute inset-0 opacity-60">
          <img 
            src="https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?auto=format&fit=crop&q=80&w=2021" 
            className="w-full h-full object-cover"
            alt="Utah landscape"
          />
        </div>
        <div className="relative z-10 text-center px-4 max-w-4xl">
          <div className="inline-block px-4 py-1 bg-orange-600 text-white text-xs font-bold tracking-widest uppercase rounded-full mb-6">
            8-Day Itinerary
          </div>
          <h1 className="text-5xl md:text-7xl font-black text-white mb-6 drop-shadow-2xl">
            UTAH SCENIC <span className="text-orange-400 underline decoration-orange-600">ROAD TRIP</span>
          </h1>
          <p className="text-xl md:text-2xl text-stone-100 font-light max-w-2xl mx-auto drop-shadow-lg">
            A polished, start-to-finish plan combining route, timing, and strategy into one clean itinerary.
          </p>
          <div className="mt-8 flex flex-wrap justify-center gap-4 text-white font-medium">
            <span className="flex items-center gap-2 bg-white/20 backdrop-blur-md px-4 py-2 rounded-lg border border-white/30 text-sm md:text-base">
              <MapPin className="w-4 h-4" /> SLC Airport Start
            </span>
            <span className="flex items-center gap-2 bg-white/20 backdrop-blur-md px-4 py-2 rounded-lg border border-white/30 text-sm md:text-base">
              <Sun className="w-4 h-4" /> July-Optimized
            </span>
          </div>
        </div>
      </header>

      {/* Quick Stats Grid */}
      <div className="max-w-6xl mx-auto -mt-16 relative z-20 px-4">
        <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
          {[
            { label: "Driving", val: "22+ Hours", icon: Navigation, color: "bg-blue-600" },
            { label: "Parks", val: "6 Unique Areas", icon: MapPin, color: "bg-green-600" },
            { label: "Best View", val: "Monument Valley", icon: Camera, color: "bg-orange-600" },
            { label: "Est. Cost", val: "$1.7k - $2.7k", icon: DollarSign, color: "bg-emerald-600" }
          ].map((stat, i) => (
            <div key={i} className="bg-white p-6 rounded-2xl shadow-xl flex flex-col items-center text-center border border-stone-100">
              <div className={`${stat.color} p-3 rounded-xl text-white mb-3`}>
                <stat.icon className="w-6 h-6" />
              </div>
              <span className="text-xs text-stone-400 font-bold uppercase tracking-wider">{stat.label}</span>
              <span className="text-lg font-bold text-stone-800">{stat.val}</span>
            </div>
          ))}
        </div>
      </div>

      <main className="max-w-6xl mx-auto py-16 px-4">
        
        {/* Itinerary Timeline */}
        <div className="space-y-24">
          {itinerary.map((item, idx) => (
            <div key={idx} className="flex flex-col lg:flex-row gap-12 items-start">
              {/* Day Header & Sidebar */}
              <div className="lg:w-1/3 w-full lg:sticky lg:top-8">
                <div className="flex items-center gap-4 mb-6">
                  <span className="text-6xl font-black text-orange-200">0{item.day}</span>
                  <div>
                    <h3 className="text-3xl font-bold text-stone-800 leading-tight">{item.title}</h3>
                    <p className="text-orange-600 font-bold flex items-center gap-1 uppercase tracking-wider text-sm">
                      <MapPin className="w-4 h-4" /> {item.location}
                    </p>
                  </div>
                </div>
                
                {/* Schedule Card */}
                <div className="bg-white p-6 rounded-3xl shadow-sm border border-stone-200 mb-6">
                  <div className="flex items-center gap-2 text-stone-500 text-xs font-bold mb-6 border-b border-stone-100 pb-3 tracking-widest uppercase">
                    <Clock className="w-4 h-4" /> Daily Schedule
                  </div>
                  <div className="space-y-5">
                    {item.schedule.map((step, sidx) => (
                      <div key={sidx} className="flex gap-4">
                        <span className="text-[10px] font-mono bg-stone-100 px-2 py-1 rounded text-stone-600 w-12 text-center flex-shrink-0 self-start border border-stone-200">
                          {step.time}
                        </span>
                        <span className="text-stone-700 text-sm font-medium leading-relaxed">{step.text}</span>
                      </div>
                    ))}
                  </div>
                </div>

                {/* Stay & Map Card */}
                <div className="grid grid-cols-1 gap-4">
                  <div className="bg-stone-800 p-5 rounded-2xl text-white shadow-lg">
                    <div className="text-[10px] text-stone-400 uppercase font-black tracking-widest mb-2 flex items-center gap-2">
                      <Moon className="w-3 h-3" /> Accommodation
                    </div>
                    <div className="text-base font-bold text-orange-400">{item.stay}</div>
                  </div>

                  {/* Google Map Embed */}
                  <div className="bg-white p-2 rounded-2xl shadow-sm border border-stone-200 overflow-hidden h-48 relative group">
                    <iframe
                      title={`Map for ${item.location}`}
                      width="100%"
                      height="100%"
                      style={{ border: 0 }}
                      loading="lazy"
                      allowFullScreen
                      referrerPolicy="no-referrer-when-downgrade"
                      src={`https://maps.google.com/maps?q=${encodeURIComponent(item.mapQuery)}&t=&z=10&ie=UTF8&iwloc=&output=embed`}
                      className="rounded-xl"
                    />
                    <div className="absolute top-2 right-2 bg-white/90 backdrop-blur-md p-2 rounded-lg shadow-sm border border-stone-100 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
                      <MapIcon className="w-4 h-4 text-orange-600" />
                    </div>
                  </div>
                </div>
              </div>

              {/* Day Visual Media */}
              <div className="lg:w-2/3 w-full">
                <div className="relative rounded-[2.5rem] overflow-hidden shadow-2xl aspect-[16/10] bg-stone-200 group ring-1 ring-stone-200">
                  {item.image ? (
                    <img 
                      src={item.image} 
                      className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" 
                      alt={item.location} 
                    />
                  ) : loadingImages[item.day] ? (
                    <div className="absolute inset-0 flex flex-col items-center justify-center bg-stone-50">
                      <div className="w-12 h-12 border-4 border-orange-500 border-t-transparent rounded-full animate-spin mb-4"></div>
                      <span className="text-stone-400 text-xs font-bold tracking-widest uppercase">Capturing Landscape...</span>
                    </div>
                  ) : images[item.day] ? (
                    <img 
                      src={images[item.day]} 
                      className="w-full h-full object-cover transition-transform duration-1000 group-hover:scale-105" 
                      alt={item.location} 
                    />
                  ) : (
                    <div className="absolute inset-0 flex flex-col items-center justify-center p-12 text-center bg-stone-100">
                      <div className="w-20 h-20 bg-white rounded-3xl shadow-sm flex items-center justify-center mb-6">
                        <Camera className="w-8 h-8 text-orange-500" />
                      </div>
                      <h4 className="text-xl font-bold text-stone-800 mb-2">Ready to see {item.location}?</h4>
                      <p className="text-stone-500 max-w-sm mb-8">Click below to generate a cinematic visual preview of this destination's unique red rock beauty.</p>
                      <button 
                        onClick={() => generateImage(item.prompt, item.day)}
                        className="bg-orange-600 hover:bg-orange-700 text-white px-8 py-3 rounded-2xl font-black transition-all shadow-xl hover:-translate-y-1 active:scale-95 flex items-center gap-3"
                      >
                        Generate Visual <ChevronRight className="w-5 h-5" />
                      </button>
                    </div>
                  )}
                  
                  {/* Overlay Info */}
                  <div className="absolute bottom-0 left-0 right-0 p-8 bg-gradient-to-t from-black/90 via-black/40 to-transparent">
                    <div className="flex flex-wrap justify-between items-end gap-6">
                      <div className="flex gap-8">
                        <div>
                          <div className="text-white/60 text-[10px] font-black uppercase tracking-widest mb-1">Transit</div>
                          <div className="text-white font-bold flex items-center gap-2 text-lg">
                            <Navigation className="w-5 h-5 text-orange-400" /> {item.drive}
                          </div>
                        </div>
                      </div>
                      <div className="text-right">
                        <div className="text-white/60 text-[10px] font-black uppercase tracking-widest mb-1">Major Highlight</div>
                        <div className="text-orange-400 font-black text-lg">{item.highlights.split(',')[0]}</div>
                      </div>
                    </div>
                  </div>
                </div>
                
                {/* Secondary highlights pill */}
                <div className="mt-6 flex flex-wrap gap-2">
                  {item.highlights.split(',').map((h, i) => (
                    <span key={i} className="px-4 py-2 bg-white border border-stone-200 rounded-full text-xs font-bold text-stone-600 shadow-sm">
                      # {h.trim()}
                    </span>
                  ))}
                </div>
              </div>
            </div>
          ))}
        </div>

        {/* July Survival Rules */}
        <section className="mt-32 bg-stone-900 rounded-[4rem] p-10 md:p-20 text-white relative overflow-hidden shadow-3xl">
          <div className="absolute top-0 right-0 w-96 h-96 bg-orange-600 rounded-full blur-[150px] opacity-20 -mr-48 -mt-48"></div>
          <div className="absolute bottom-0 left-0 w-64 h-64 bg-blue-600 rounded-full blur-[120px] opacity-10 -ml-32 -mb-32"></div>
          
          <div className="relative z-10">
            <div className="mb-16">
              <h2 className="text-4xl md:text-6xl font-black mb-6 flex items-center gap-4">
                <Thermometer className="w-12 h-12 text-orange-500" /> JULY SURVIVAL <span className="text-orange-500 italic">PROTOCOL</span>
              </h2>
              <p className="text-stone-400 text-lg max-w-2xl">The Utah desert in July is breathtaking but dangerous. Follow these four non-negotiable rules for a safe trip.</p>
            </div>

            <div className="grid md:grid-cols-2 lg:grid-cols-4 gap-8">
              {[
                { title: "Early Bird", text: "Start before 6:00 AM. Many parks fill by 8 AM, and temperatures skyrocket soon after.", icon: Sun, border: "border-orange-500/30" },
                { title: "Peak Rest", text: "Avoid all hiking between 11:00 AM and 5:00 PM. This is your 'Drive or Nap' window.", icon: Moon, border: "border-blue-500/30" },
                { title: "Hydration", text: "3-4 Liters per person daily. If you wait until you're thirsty, you're already dehydrated.", icon: Droplets, border: "border-teal-500/30" },
                { title: "Vehicle Care", text: "Always have a full tank before entering Byway 12 or Monument Valley. Check tires often.", icon: Fuel, border: "border-red-500/30" }
              ].map((rule, idx) => (
                <div key={idx} className={`bg-white/5 backdrop-blur-md p-8 rounded-[2rem] border ${rule.border} transition-all hover:bg-white/10`}>
                  <div className="w-14 h-14 bg-stone-800 rounded-2xl flex items-center justify-center mb-6 shadow-xl border border-white/10">
                    <rule.icon className="w-7 h-7 text-orange-500" />
                  </div>
                  <h4 className="text-2xl font-bold mb-4">{rule.title}</h4>
                  <p className="text-stone-400 text-sm leading-relaxed">{rule.text}</p>
                </div>
              ))}
            </div>
          </div>
        </section>

        {/* Logistics & Budget */}
        <div className="mt-32 grid lg:grid-cols-2 gap-12">
          {/* Gas Strategy */}
          <div className="bg-white p-12 rounded-[3.5rem] border border-stone-200 shadow-xl relative overflow-hidden">
            <div className="absolute top-0 right-0 p-8 text-stone-50">
              <Fuel className="w-32 h-32 rotate-12" />
            </div>
            <div className="relative z-10">
              <h3 className="text-3xl font-black mb-10 flex items-center gap-4">
                <Fuel className="text-orange-600 w-8 h-8" /> GAS STRATEGY
              </h3>
              <div className="space-y-6">
                {[
                  { city: "Cedar City", tip: "Cheapest fuel before entering the National Park zones." },
                  { city: "Escalante", tip: "The only reliable gas for 50 miles in either direction." },
                  { city: "Torrey", tip: "Last chance for top-tier fuel before the long haul to Moab." },
                  { city: "Monument Valley", tip: "CRITICAL: The nearest station is miles away. Enter with 100% full tank." }
                ].map((gas, i) => (
                  <div key={i} className="flex gap-6 p-6 bg-stone-50 rounded-3xl group transition-all hover:shadow-md border border-transparent hover:border-orange-100">
                    <div className="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center font-black text-orange-600 text-xl border border-stone-100 group-hover:bg-orange-600 group-hover:text-white transition-colors">
                      {i + 1}
                    </div>
                    <div>
                      <div className="font-black text-stone-800 text-lg mb-1">{gas.city}</div>
                      <div className="text-sm text-stone-500 leading-relaxed">{gas.tip}</div>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>

          {/* Budget Snapshot */}
          <div className="bg-orange-600 p-12 rounded-[3.5rem] text-white shadow-2xl flex flex-col relative overflow-hidden">
            <div className="absolute bottom-0 right-0 p-4 opacity-10">
              <DollarSign className="w-48 h-48 -mr-12 -mb-12" />
            </div>
            <div className="relative z-10 h-full flex flex-col">
              <h3 className="text-3xl font-black mb-10 flex items-center gap-4">
                <DollarSign className="text-orange-200 w-8 h-8" /> BUDGET SNAPSHOT
              </h3>
              <div className="space-y-8 flex-grow">
                {[
                  { cat: "Hotels", range: "$900 – $1,500", detail: "Zion Canyon Lodge & The View are the major costs." },
                  { cat: "Car + Fuel", range: "$500 – $800", detail: "Mid-size SUV + high-mileage gas consumption." },
                  { cat: "Food", range: "$250 – $400", detail: "Budget for packing coolers & resort dinners." },
                  { cat: "Park Pass", range: "$80", detail: "Buy 'America the Beautiful' at your first gate." }
                ].map((item, i) => (
                  <div key={i} className="flex justify-between items-start border-b border-white/20 pb-6 transition-all hover:bg-white/5 p-2 rounded-lg">
                    <div>
                      <div className="font-black text-xl mb-1">{item.cat}</div>
                      <div className="text-xs text-orange-100 font-medium opacity-80">{item.detail}</div>
                    </div>
                    <div className="text-right font-black text-2xl text-orange-100">{item.range}</div>
                  </div>
                ))}
              </div>
              <div className="mt-12 pt-8 border-t-2 border-dashed border-orange-400 flex flex-col sm:flex-row justify-between items-center gap-4">
                <span className="text-xl font-bold opacity-90">Total Estimated Cost (Per Person)</span>
                <span className="text-5xl font-black text-white drop-shadow-lg">~$1.7k - $2.7k</span>
              </div>
            </div>
          </div>
        </div>
      </main>

      <footer className="bg-stone-900 py-24 text-center mt-32">
        <div className="max-w-2xl mx-auto px-6">
          <div className="w-20 h-20 bg-orange-600 rounded-3xl mx-auto flex items-center justify-center mb-10 shadow-2xl shadow-orange-900/20 ring-4 ring-orange-500/20">
            <Navigation className="text-white w-10 h-10" />
          </div>
          <h2 className="text-4xl font-black text-white mb-6">Adventure is Calling.</h2>
          <p className="text-stone-400 text-lg mb-10 leading-relaxed">
            Utah's red rock desert is a place of profound silence and immense beauty. Pack twice as much water as you think you need and leave no trace behind.
          </p>
          <div className="inline-flex items-center gap-4 bg-stone-800 px-6 py-3 rounded-2xl border border-stone-700">
            <div className="text-[10px] text-stone-500 uppercase tracking-widest font-black text-left">
              Planner Version<br/>
              <span className="text-stone-300">2.1.0 Interactive</span>
            </div>
            <div className="w-px h-8 bg-stone-700"></div>
            <div className="text-[10px] text-stone-500 uppercase tracking-widest font-black text-left">
              Created for<br/>
              <span className="text-orange-500">Ultimate Exploration</span>
            </div>
          </div>
        </div>
      </footer>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
